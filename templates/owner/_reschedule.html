<div class="bg-white rounded-xl shadow p-4 border border-indigo-200">
  <div class="flex items-center justify-between mb-3">
    <h3 class="font-semibold">Reschedule — {{ booking.customer_name }} ({{ service.name }})</h3>
    <button onclick="document.getElementById('reschedule-panel').innerHTML=''"
            class="text-xs text-slate-500 hover:underline">Close</button>
  </div>
  <p class="text-sm text-slate-500 mb-3">Currently: {{ booking.start_time | ist }}</p>

  {% if error %}
  <p class="bg-red-50 text-red-700 text-sm rounded p-2 mb-3">{{ error }}</p>
  {% endif %}

  <form
    hx-get="/dashboard/bookings/{{ booking.id }}/reschedule"
    hx-target="#reschedule-panel"
    hx-swap="innerHTML"
    class="flex items-end gap-2 mb-4">
    <div>
      <label class="block text-xs font-medium mb-1">Pick a day</label>
      <input type="date" name="date" value="{{ date }}" class="border rounded-lg p-2" />
    </div>
    <button type="submit" class="bg-slate-200 rounded-lg px-3 py-2 text-sm">Show times</button>
  </form>

  {% if slots %}
  <div class="flex flex-wrap gap-2">
    {% for slot in slots %}
    <button
      hx-post="/dashboard/bookings/{{ booking.id }}/reschedule"
      hx-vals='{"start_time": "{{ slot.isoformat() }}"}'
      hx-target="#bookings-table"
      hx-swap="innerHTML"
      onclick="document.getElementById('reschedule-panel').innerHTML=''"
      class="border border-indigo-300 text-indigo-700 rounded-lg px-3 py-1.5 hover:bg-indigo-50">
      {{ slot | ist("%I:%M %p") }}
    </button>
    {% endfor %}
  </div>
  {% else %}
  <p class="text-slate-500 text-sm">No free times on {{ date }}.</p>
  {% endif %}
</div>
