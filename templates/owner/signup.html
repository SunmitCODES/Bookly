{% extends "base.html" %}
{% block title %}Sign up — Bookly{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto bg-white rounded-xl shadow p-6 mt-12">
  <h1 class="text-2xl font-bold mb-4">Create your Bookly account</h1>
  {% if error %}
  <p class="bg-red-50 text-red-700 text-sm rounded p-2 mb-3">That email is already registered.</p>
  {% endif %}
  <form method="post" action="/signup" class="space-y-3">
    <input name="email" type="email" required placeholder="Email"
           class="w-full border rounded-lg p-2" />
    <input name="password" type="password" required placeholder="Password"
           class="w-full border rounded-lg p-2" />
    <button type="submit"
            class="w-full bg-indigo-600 text-white rounded-lg px-4 py-2 hover:bg-indigo-700">
      Sign up
    </button>
  </form>
  <p class="text-sm text-slate-500 mt-4">
    Already have an account? <a href="/login" class="text-indigo-600 hover:underline">Log in</a>
  </p>
</div>
{% endblock %}
