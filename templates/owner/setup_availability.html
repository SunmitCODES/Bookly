{% extends "base.html" %}
{% block title %}Your hours — Bookly{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold mb-1">Working hours</h1>
  <p class="text-slate-500 mb-5">Step 3 of 3 — when are you open?</p>

  <form method="post" action="/setup/availability"
        class="bg-white rounded-xl shadow p-5 space-y-3">
    {% for d in days %}
    <div class="flex items-center gap-2 text-sm">
      <label class="w-28 flex items-center gap-2">
        <input type="checkbox" name="active_{{ d.index }}" {% if d.active %}checked{% endif %} />
        {{ d.label }}
      </label>
      <input type="time" name="start_{{ d.index }}" value="{{ d.start }}"
             class="border rounded p-1" />
      <span>–</span>
      <input type="time" name="end_{{ d.index }}" value="{{ d.end }}"
             class="border rounded p-1" />
      <select name="slot_{{ d.index }}" class="border rounded p-1">
        {% for m in [15, 30, 45, 60] %}
        <option value="{{ m }}" {% if d.slot == m %}selected{% endif %}>{{ m }} min</option>
        {% endfor %}
      </select>
    </div>
    {% endfor %}
    <button type="submit"
            class="w-full bg-indigo-600 text-white rounded-lg px-4 py-2 hover:bg-indigo-700 mt-2">
      Finish setup
    </button>
  </form>
</div>
{% endblock %}
