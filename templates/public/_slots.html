{% if error %}
<p class="bg-red-50 text-red-700 text-sm rounded p-2 mb-3">{{ error }}</p>
{% endif %}
{% if slots %}
<p class="text-sm font-medium mb-2">Available times on {{ date }}:</p>
<div class="flex flex-wrap gap-2">
  {% for slot in slots %}
  <button
    hx-get="/b/{{ slug }}/booking-form"
    hx-vals='{"service_id": "{{ service_id }}", "start_time": "{{ slot.isoformat() }}"}'
    hx-target="#slots"
    hx-swap="innerHTML"
    class="border border-indigo-300 text-indigo-700 rounded-lg px-3 py-1.5 hover:bg-indigo-50"
  >
    {{ slot | ist("%I:%M %p") }}
  </button>
  {% endfor %}
</div>
{% else %}
<p class="text-slate-500">No available times on {{ date }}. Try another day.</p>
{% endif %}
